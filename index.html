<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Chatbot 😎</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      color: #333;
      transition: background 0.3s, color 0.3s;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      max-width: 100%;
      width: 100%;
      height: 100vh;
      margin: 0 auto;
    }

    .chat-header {
      background: #4CAF50;
      color: white;
      padding: 1rem;
      font-size: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .theme-toggle {
      cursor: pointer;
      padding: 5px 10px;
      border: none;
      background: #333;
      color: white;
      border-radius: 5px;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background: white;
    }

    .chat-box .user,
    .chat-box .bot {
      margin-bottom: 10px;
    }

    .chat-box .user {
      text-align: right;
      color: #2196F3;
    }

    .chat-box .bot {
      text-align: left;
      color: #4CAF50;
    }

    .typing {
      font-style: italic;
      color: gray;
    }

    .chat-input {
      display: flex;
      flex-wrap: wrap;
      border-top: 1px solid #ccc;
      padding: 0.5rem;
      background: #fafafa;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-bottom: 0.5rem;
    }

    .chat-input button {
      padding: 10px;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      margin-left: 0.5rem;
    }

    .send-btn {
      background: #4CAF50;
      color: white;
    }

    .clear-btn {
      background: red;
      color: white;
    }

    .emoji-btn {
      background: #ff9800;
      color: white;
    }

    .emoji-picker {
      display: none;
      flex-wrap: wrap;
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px;
      max-width: 100%;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    .emoji-picker span {
      font-size: 1.5rem;
      cursor: pointer;
      margin: 5px;
    }

    .dark-mode {
      background: #333;
      color: white;
    }

    .dark-mode .chat-box {
      background: #222;
      color: white;
    }

    .dark-mode input,
    .dark-mode .emoji-picker {
      background: #444;
      color: white;
    }

    @media (max-width: 600px) {
      .chat-input {
        flex-direction: column;
        align-items: stretch;
      }

      .chat-input button {
        width: 100%;
        margin: 5px 0;
      }

      .chat-box {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    Advanced Chatbot 🤖
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>

  <div id="chat-box" class="chat-box"></div>

  <div class="emoji-picker" id="emoji-picker"></div>

  <div class="chat-input">
    <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)" />
    <button class="emoji-btn" onclick="toggleEmojiPicker()">😊</button>
    <button class="send-btn" onclick="sendMessage()">Send</button>
    <button class="clear-btn" onclick="clearChat()">🗑</button>
  </div>
</div>

<script>
  const BOT_RESPONSE_DELAY = 800;
  const chatBox = document.getElementById("chat-box");
  const emojiPicker = document.getElementById("emoji-picker");
  const inputElem = document.getElementById("user-input");

  const emojiList = ["😀","😁","😂","🤣","😃","😅","😆","😉","😊","😋","😎","😍","😘","🥰","😗","🤔","🤗","😇","🙃","😐","😶","😑","😒","🙄","😬","😴","🤖","🎉","🔥","❤️"];

  const botResponses = JSON.parse(localStorage.getItem('botResponses')) || {
    "hi": "Hello! How can I help you?",
    "hello": "Hey there! 👋",
    "how are you": "I'm doing great! Thanks for asking 😊",
    "bye": "Goodbye! Have a great day! 🌟"
  };

  const chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function scrollChatToBottom() {
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function loadChatHistory() {
    if (chatHistory.length === 0) {
      const welcomeMsg = "Hi there! I'm your smart learning buddy. Ask me anything!";
      chatBox.innerHTML = `<div class="bot"><strong>Bot [${getTime()}]:</strong> ${welcomeMsg}</div>`;
      chatHistory.push({ sender: "bot", text: welcomeMsg });
      localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
    } else {
      chatBox.innerHTML = chatHistory.map(msg =>
        `<div class="${msg.sender}"><strong>${msg.sender === 'user' ? 'You' : 'Bot'} [${getTime()}]:</strong> ${msg.text}</div>`
      ).join('');
    }

    scrollChatToBottom();
  }

  function sendMessage() {
    const userInput = inputElem.value.trim();
    if (userInput === "") return;

    const time = getTime();
    chatBox.innerHTML += `<div class="user"><strong>You [${time}]:</strong> ${userInput}</div>`;
    chatHistory.push({ sender: "user", text: userInput });
    inputElem.value = "";

    const typingIndicator = document.createElement("div");
    typingIndicator.className = "typing";
    typingIndicator.innerText = "Bot is typing...";
    chatBox.appendChild(typingIndicator);

    scrollChatToBottom();

    setTimeout(() => {
      typingIndicator.remove();
      let botReply = botResponses[userInput.toLowerCase()] || null;

      if (!botReply && !botResponses.hasOwnProperty(userInput.toLowerCase())) {
        botReply = prompt(`I don't know how to respond to "${userInput}". Teach me a reply:`);
        if (botReply && botReply.trim() !== "") {
          botReply = botReply.trim();
          botResponses[userInput.toLowerCase()] = botReply;
          localStorage.setItem('botResponses', JSON.stringify(botResponses));
        } else {
          botReply = "Okay, maybe next time. 🤖";
        }
      }

      chatBox.innerHTML += `<div class="bot"><strong>Bot [${getTime()}]:</strong> ${botReply}</div>`;
      chatHistory.push({ sender: "bot", text: botReply });

      localStorage.setItem('chatHistory', JSON.stringify(chatHistory));

      speak(botReply);
      scrollChatToBottom();
    }, BOT_RESPONSE_DELAY);
  }

  function handleKeyPress(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  }

  function toggleTheme() {
    document.body.classList.toggle("dark-mode");
  }

  function clearChat() {
    if (confirm("Are you sure you want to clear the chat?")) {
      localStorage.removeItem("chatHistory");
      chatBox.innerHTML = "";
    }
  }

  function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
  }

  function toggleEmojiPicker() {
    if (emojiPicker.style.display === "flex") {
      emojiPicker.style.display = "none";
    } else {
      emojiPicker.style.display = "flex";
      renderEmojis();
    }
  }

  function renderEmojis() {
    emojiPicker.innerHTML = "";
    emojiList.forEach(emoji => {
      const span = document.createElement("span");
      span.textContent = emoji;
      span.onclick = () => {
        inputElem.value += emoji;
        inputElem.focus();
      };
      emojiPicker.appendChild(span);
    });
  }

  // Load chat on page load
  loadChatHistory();
</script>

</body>
</html>
